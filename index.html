<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Interactive Periodic Table | Chemical Elements Explorer</title>
    <meta name="title" content="Interactive Periodic Table | Chemical Elements Explorer">
    <meta name="description"
        content="Explore the chemical elements with this interactive periodic table. View atomic numbers, symbols, weights, and detailed properties of every element in a responsive JS interface.">
    <meta name="keywords"
        content="periodic table, chemistry, chemical elements, atomic number, science app, interactive periodic table, javascript periodic table, kbrault">
    <meta name="author" content="kbrault">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="index, follow">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://kbrault.github.io/periodic-table-js/">
    <meta property="og:title" content="Interactive Periodic Table | Chemical Elements Explorer">
    <meta property="og:description"
        content="A fully interactive, responsive periodic table built with JavaScript. Perfect for students and chemistry enthusiasts.">
    <meta property="og:image" content="https://kbrault.github.io/periodic-table-js/screenshot.png">
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://kbrault.github.io/periodic-table-js/">
    <meta property="twitter:title" content="Interactive Periodic Table Explorer">
    <meta property="twitter:description"
        content="Browse and learn about chemical elements with this interactive periodic table web application.">
    <meta property="twitter:image" content="https://kbrault.github.io/periodic-table-js/screenshot.png">
    <link rel="canonical" href="https://kbrault.github.io/periodic-table-js/">
    <style>
        :root {
            --bg-color: #0b0f1a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --accent: #a0a6ad;
            --alkali: #ef4444;
            --alkaline: #f97316;
            --transition: #eab308;
            --post-transition: #a855f7;
            --metalloid: #10b981;
            --nonmetal: #0ea5e9;
            --noble: #ec4899;
            --lanthanide: #6366f1;
            --actinide: #d946ef;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: stretch;
            gap: 15px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .control-box,
        input[type="text"],
        select,
        .reset-btn {
            background: var(--card-bg);
            padding: 0 15px;
            border-radius: 12px;
            border: 1px solid #334155;
            color: white;
            height: 50px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
            outline: none;
        }

        .reset-btn {
            cursor: pointer;
            background: #334155;
            transition: all 0.2s;
            font-weight: bold;
            border: 1px solid #475569;
        }

        .reset-btn:hover {
            background: #ef4444;
            border-color: #ef4444;
        }

        .legend {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            opacity: 0.8;
        }

        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 3px;
        }

        .table-wrapper {
            width: 100%;
            overflow-x: auto;
            padding: 20px 0;
            display: flex;
        }

        .periodic-table {
            display: grid;
            grid-template-columns: repeat(18, 68px);
            grid-template-rows: repeat(10, 68px);
            gap: 6px;
            margin: auto;
            width: fit-content;
        }

        .element-card {
            background-color: var(--card-bg);
            padding: 8px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            border-bottom: 4px solid transparent;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.4s ease, opacity 0.4s ease;
        }

        .element-card:hover {
            transform: scale(1.6);
            z-index: 100;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.9);
            background-color: #2d3748;
        }

        .element-card .num {
            font-size: 0.7rem;
            position: absolute;
            top: 5px;
            left: 8px;
            opacity: 0.6;
        }

        .element-card .sym {
            font-size: 1.4rem;
            font-weight: bold;
        }

        .dimmed {
            opacity: 0.1 !important;
            filter: grayscale(0.8) blur(2px) !important;
            pointer-events: none;
        }

        .state-liquid {
            box-shadow: inset 0 0 8px var(--accent);
        }

        .state-gas {
            border-style: dashed !important;
            opacity: 0.5;
        }

        .alkali-metal {
            border-color: var(--alkali);
        }

        .alkaline-earth-metal {
            border-color: var(--alkaline);
        }

        .transition-metal {
            border-color: var(--transition);
        }

        .post-transition-metal {
            border-color: var(--post-transition);
        }

        .metalloid {
            border-color: var(--metalloid);
        }

        .diatomic-nonmetal {
            border-color: var(--nonmetal);
        }

        .noble-gas {
            border-color: var(--noble);
        }

        .lanthanide {
            border-color: var(--lanthanide);
        }

        .actinide {
            border-color: var(--actinide);
        }

        #search {
            width: 140px;
            flex: none;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: #1e293b;
            padding: 40px;
            border-radius: 24px;
            width: 90%;
            max-width: 500px;
            position: relative;
            border: 1px solid #334155;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        #close-modal {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 30px;
            height: 30px;
            background: none;
            border: none;
            cursor: pointer;
        }

        #close-modal::before,
        #close-modal::after {
            content: '';
            position: absolute;
            top: 14px;
            left: 0;
            width: 30px;
            height: 2px;
            background-color: white;
        }

        #close-modal::before {
            transform: rotate(45deg);
        }

        #close-modal::after {
            transform: rotate(-45deg);
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            border-top: 1px solid #334155;
            padding-top: 20px;
            margin-top: 20px;
        }

        .info-item b {
            display: block;
            color: var(--accent);
            font-size: 0.8rem;
        }

        .wiki-btn {
            display: block;
            margin-top: 25px;
            padding: 12px;
            text-align: center;
            text-decoration: none;
            font-weight: bold;
            border-radius: 8px;
            color: white;
            transition: opacity 0.2s;
        }

        .wiki-btn:hover {
            opacity: 0.8;
        }

        .github-corner:hover .octo-arm {
            animation: octocat-wave 560ms ease-in-out;
        }

        @keyframes octocat-wave {

            0%,
            100% {
                transform: rotate(0);
            }

            20%,
            60% {
                transform: rotate(-25deg);
            }

            40%,
            80% {
                transform: rotate(10deg);
            }
        }

        @media (max-width: 500px) {
            .github-corner:hover .octo-arm {
                animation: none;
            }

            .github-corner .octo-arm {
                animation: octocat-wave 560ms ease-in-out;
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="controls">
            <button class="reset-btn" onclick="resetAllFilters()">Reset All</button>

            <input type="text" id="search" placeholder="Search..." oninput="filterElements()">

            <select id="filter-category" onchange="filterElements()">
                <option value="all">All Groups</option>
                <option value="alkali-metal">Alkali</option>
                <option value="alkaline-earth-metal">Alkaline</option>
                <option value="transition-metal">Transition</option>
                <option value="post-transition-metal">Post-Transition</option>
                <option value="lanthanide">Lanthanide</option>
                <option value="actinide">Actinide</option>
                <option value="metalloid">Metalloid</option>
                <option value="diatomic-nonmetal">Nonmetal</option>
                <option value="noble-gas">Noble Gas</option>
            </select>

            <div class="control-box">
                <label>Temp: <b id="temp-val">298</b>K</label>
                <input type="range" id="temp-slider" min="0" max="6000" value="298"
                    oninput="updateStates(this.value); filterElements();">
            </div>

            <div class="control-box">
                <label>Melt: <b id="melt-val">0</b>K+</label>
                <input type="range" id="melt-slider" min="0" max="4000" value="0" oninput="filterElements()">
            </div>

            <div class="control-box">
                <label>Valence: <b id="valence-val">All</b></label>
                <input type="range" id="valence-slider" min="0" max="8" value="0" oninput="filterElements()">
            </div>
        </div>

        <div class="legend">
            <div class="legend-item">
                <div class="legend-dot" style="background:var(--alkali)"></div>Alkali
            </div>
            <div class="legend-item">
                <div class="legend-dot" style="background:var(--alkaline)"></div>Alkaline
            </div>
            <div class="legend-item">
                <div class="legend-dot" style="background:var(--transition)"></div>Transition
            </div>
            <div class="legend-item">
                <div class="legend-dot" style="background:var(--metalloid)"></div>Metalloid
            </div>
            <div class="legend-item">
                <div class="legend-dot" style="background:var(--nonmetal)"></div>Nonmetal
            </div>
            <div class="legend-item">
                <div class="legend-dot" style="background:var(--noble)"></div>Noble
            </div>
        </div>
    </header>

    <div class="table-wrapper">
        <div id="periodic-table" class="periodic-table"></div>
    </div>

    <div id="modal-overlay" class="modal-overlay" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button id="close-modal" onclick="closeModal()"></button>
            <div id="modal-body"></div>
        </div>
    </div>

    <script>
        let elements = [];

        async function init() {
            try {
                const res = await fetch('elements.json');
                elements = await res.json();
                const table = document.getElementById('periodic-table');

                elements.forEach(el => {
                    const card = document.createElement('div');
                    card.className = `element-card ${el.cat}`;
                    card.dataset.num = el.n.toString();
                    card.dataset.name = el.name.toLowerCase();
                    card.dataset.symbol = el.s.toLowerCase();
                    card.dataset.cat = el.cat;
                    card.dataset.valence = el.valence || 0;
                    card.dataset.melt = (el.melt === "N/A" || !el.melt) ? 0 : el.melt;

                    card.style.gridColumn = el.x;
                    card.style.gridRow = el.y;

                    card.innerHTML = `<span class="num">${el.n}</span><span class="sym">${el.s}</span><span style="font-size:0.6rem;">${el.name}</span>`;
                    card.onclick = () => showDetails(el);
                    table.appendChild(card);
                });
                updateStates(298);
            } catch (e) { console.error("JSON Error", e); }
        }

        function resetAllFilters() {
            document.getElementById('search').value = '';
            document.getElementById('filter-category').value = 'all';
            document.getElementById('temp-slider').value = 298;
            document.getElementById('melt-slider').value = 0;
            document.getElementById('valence-slider').value = 0;

            updateStates(298);
            filterElements();
        }

        function filterElements() {
            const query = document.getElementById('search').value.toLowerCase();
            const cat = document.getElementById('filter-category').value;
            const valenceVal = parseInt(document.getElementById('valence-slider').value);
            const meltLimit = parseInt(document.getElementById('melt-slider').value);

            document.getElementById('valence-val').innerText = valenceVal === 0 ? "All" : valenceVal;
            document.getElementById('melt-val').innerText = meltLimit;

            document.querySelectorAll('.element-card').forEach(card => {
                const matchesSearch = card.dataset.name.includes(query) || card.dataset.symbol.includes(query) || card.dataset.num.includes(query);
                const matchesCat = (cat === 'all' || card.dataset.cat === cat);
                const matchesValence = (valenceVal === 0 || parseInt(card.dataset.valence) === valenceVal);
                const matchesMelt = (parseFloat(card.dataset.melt) >= meltLimit);

                card.classList.toggle('dimmed', !(matchesSearch && matchesCat && matchesValence && matchesMelt));
            });
        }

        function updateStates(kelvin) {
            document.getElementById('temp-val').innerText = kelvin;
            elements.forEach(el => {
                const card = document.querySelector(`.element-card[data-num="${el.n}"]`);
                if (!card) return;
                card.classList.remove('state-liquid', 'state-gas');
                if (el.melt !== "N/A" && kelvin > el.melt && kelvin < el.boil) card.classList.add('state-liquid');
                if (el.boil !== "N/A" && kelvin >= el.boil) card.classList.add('state-gas');
            });
        }

        function showDetails(el) {
            const body = document.getElementById('modal-body');
            const modalContent = document.querySelector('.modal-content');

            const categoryColors = {
                'alkali-metal': 'var(--alkali)',
                'alkaline-earth-metal': 'var(--alkaline)',
                'transition-metal': 'var(--transition)',
                'post-transition-metal': 'var(--post-transition)',
                'metalloid': 'var(--metalloid)',
                'diatomic-nonmetal': 'var(--nonmetal)',
                'noble-gas': 'var(--noble)',
                'lanthanide': 'var(--lanthanide)',
                'actinide': 'var(--actinide)'
            };
            const groupColor = categoryColors[el.cat] || 'var(--accent)';

            modalContent.style.borderColor = groupColor;
            modalContent.style.boxShadow = `0 0 20px ${groupColor}40`;

            body.innerHTML = `
                <h2 style="font-size:2.5rem; margin:0; color:${groupColor};">${el.name} (${el.s})</h2>
                <div class="info-grid">
                    <div class="info-item"><b>Atomic Number</b> ${el.n}</div>
                    <div class="info-item"><b>Atomic Mass</b> ${el.m} u</div>
                    <div class="info-item"><b>Electronegativity</b> ${el.en}</div>
                    <div class="info-item"><b>Valence Electrons</b> ${el.valence}</div>
                    <div class="info-item"><b>Melting Point</b> ${el.melt} K</div>
                    <div class="info-item"><b>Boiling Point</b> ${el.boil} K</div>
                </div>
                <a href="https://en.wikipedia.org/wiki/${el.name}" target="_blank" class="wiki-btn" style="background-color:${groupColor};">WIKIPEDIA</a>
            `;
            document.getElementById('modal-overlay').style.display = 'flex';
        }

        function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }
        init();
    </script>
    <a href="https://github.com/kbrault/periodic-table-js" class="github-corner" aria-label="View source on GitHub">
        <svg width="80" height="80" viewBox="0 0 250 250"
            style="fill:#334155; color:#fff; position: absolute; top: 0; border: 0; right: 0;" aria-hidden="true">
            <path d="M0,0 L115,115 L130,115 L142,142 L250,250 L250,0 Z"></path>
            <path
                d="M128.3,109.0 C113.8,99.7 119.0,89.6 119.0,89.6 C122.0,82.7 120.5,78.6 120.5,78.6 C119.2,72.0 123.4,76.3 123.4,76.3 C127.3,80.9 125.5,87.3 125.5,87.3 C122.9,97.6 130.6,101.9 134.4,103.2"
                fill="currentColor" style="transform-origin: 130px 106px;" class="octo-arm"></path>
            <path
                d="M115.0,115.0 C114.9,115.1 118.7,116.5 119.8,115.4 L133.7,101.6 C136.9,99.2 139.9,98.4 142.2,98.6 C133.8,88.0 127.5,74.4 143.8,58.0 C148.5,53.4 154.0,51.2 159.7,51.0 C160.3,49.4 163.2,43.6 171.4,40.1 C171.4,40.1 176.1,42.5 178.8,56.2 C183.1,58.6 187.2,61.8 190.9,65.4 C194.5,69.0 197.7,73.2 200.1,77.6 C213.8,80.2 216.3,84.9 216.3,84.9 C212.7,93.1 206.9,96.0 205.4,96.6 C205.1,102.4 203.0,107.8 198.3,112.5 C181.9,128.9 168.3,122.5 157.7,114.1 C157.9,116.9 156.7,120.9 152.7,124.9 L141.0,136.5 C139.8,137.7 141.6,141.9 141.8,141.8 Z"
                fill="currentColor" class="octo-body"></path>
        </svg>
    </a>
</body>

</html>
