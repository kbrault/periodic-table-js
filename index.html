<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Periodic table of the elements</title>
    <style>
        :root {
            --bg-color: #0b0f1a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --accent: #38bdf8;
            --alkali: #ef4444;
            --alkaline: #f97316;
            --transition: #eab308;
            --post-transition: #a855f7;
            --metalloid: #10b981;
            --nonmetal: #0ea5e9;
            --noble: #ec4899;
            --lanthanide: #6366f1;
            --actinide: #d946ef;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            width: 100%;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        input,
        select {
            padding: 12px 20px;
            border-radius: 12px;
            border: 1px solid #334155;
            background: var(--card-bg);
            color: white;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: var(--accent);
        }

        .table-wrapper {
            width: 100%;
            overflow-x: auto;
            padding: 20px 0;
            display: flex;
            justify-content: flex-start;
        }

        .periodic-table {
            display: grid;
            grid-template-columns: repeat(18, 65px);
            grid-template-rows: repeat(10, 65px);
            gap: 6px;
            margin: 0 auto;
            min-width: 1280px;
        }

        .element-card {
            background-color: var(--card-bg);
            padding: 8px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            border-bottom: 4px solid transparent;
        }

        .element-card:hover {
            transform: translateY(-5px) scale(1.05);
            z-index: 20;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
        }

        .element-card.dimmed {
            opacity: 0.2;
            filter: grayscale(0.8);
            transform: scale(0.95);
            pointer-events: none;
        }

        .element-card .num {
            font-size: 0.7rem;
            position: absolute;
            top: 5px;
            left: 8px;
            opacity: 0.6;
        }

        .element-card .sym {
            font-size: 1.4rem;
            font-weight: bold;
        }

        .element-card .name {
            font-size: 0.6rem;
            text-align: center;
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
        }

        .alkali-metal {
            border-color: var(--alkali);
        }

        .alkaline-earth-metal {
            border-color: var(--alkaline);
        }

        .transition-metal {
            border-color: var(--transition);
        }

        .post-transition-metal {
            border-color: var(--post-transition);
        }

        .metalloid {
            border-color: var(--metalloid);
        }

        .diatomic-nonmetal {
            border-color: var(--nonmetal);
        }

        .noble-gas {
            border-color: var(--noble);
        }

        .lanthanide {
            border-color: var(--lanthanide);
        }

        .actinide {
            border-color: var(--actinide);
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(15px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: #1e293b;
            padding: 40px;
            border-radius: 24px;
            width: 90%;
            max-width: 500px;
            position: relative;
            border: 1px solid #334155;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        #close-modal {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 30px;
            height: 30px;
            background: none;
            border: none;
            cursor: pointer;
        }

        #close-modal::before,
        #close-modal::after {
            content: '';
            position: absolute;
            top: 14px;
            left: 0;
            width: 30px;
            height: 2px;
            background-color: white;
            transition: background 0.2s;
        }

        #close-modal::before {
            transform: rotate(45deg);
        }

        #close-modal::after {
            transform: rotate(-45deg);
        }

        #close-modal:hover::before,
        #close-modal:hover::after {
            background-color: var(--alkali);
        }

        .modal-body h2 {
            font-size: 2.5rem;
            margin: 0;
            color: var(--accent);
        }

        .modal-body .cat-label {
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.8rem;
            margin-bottom: 20px;
            display: block;
            opacity: 0.8;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            border-top: 1px solid #334155;
            pt: 20px;
            margin-top: 20px;
        }

        .info-item b {
            display: block;
            color: var(--accent);
            font-size: 0.8rem;
        }
    </style>
</head>

        const table = document.getElementById('periodic-table');
        const modal = document.getElementById('modal-overlay');
        const modalBody = document.getElementById('modal-body');

        function init() {
            elements.forEach(el => {
                const card = document.createElement('div');
                card.className = `element-card ${el.cat}`;
                card.dataset.name = el.name.toLowerCase();
                card.dataset.symbol = el.s.toLowerCase();
                card.dataset.num = el.n;
                card.dataset.cat = el.cat;
                card.style.gridColumn = el.x;
                card.style.gridRow = el.y;

                card.innerHTML = `
            <span class="num">${el.n}</span>
            <span class="sym">${el.s}</span>
            <span class="name">${el.name}</span>
        `;

                card.addEventListener('click', () => showDetails(el));
                table.appendChild(card);
            });
        }

        function filterElements() {
            const query = document.getElementById('search').value.toLowerCase();
            const cat = document.getElementById('filter-category').value;
            const cards = document.querySelectorAll('.element-card');

            cards.forEach(card => {
                const matchesSearch = card.dataset.name.includes(query) ||
                    card.dataset.symbol.includes(query) ||
                    card.dataset.num.includes(query);
                const matchesCat = (cat === 'all' || card.dataset.cat === cat);

                if (matchesSearch && matchesCat) {
                    card.classList.remove('dimmed');
                } else {
                    card.classList.add('dimmed');
                }
            });
        }

        function showDetails(el) {
            const boilVal = el.boil === "N/A" ? "Unknown / Unstable" : `${el.boil} K`;
            const meltVal = el.melt === "N/A" ? "Unknown" : `${el.melt} K`;

            modalBody.innerHTML = `
        <span class="cat-label">${el.cat.replace(/-/g, ' ')}</span>
        <h2>${el.name} (${el.s})</h2>
        <div class="info-grid">
            <div class="info-item"><b>Atomic Number</b>${el.n}</div>
            <div class="info-item"><b>Atomic Mass</b>${el.m} u</div>
            <div class="info-item"><b>Configuration</b>${el.config}</div>
            <div class="info-item"><b>discoveryovery</b>${el.discovery}</div>
            <div class="info-item"><b>Melting Point</b>${meltVal}</div>
            <div class="info-item"><b>Boiling Point</b>${boilVal}</div>
        </div>
    `;
            modal.style.display = 'flex';
        }

        document.getElementById('search').addEventListener('input', filterElements);
        document.getElementById('filter-category').addEventListener('change', filterElements);
        document.getElementById('close-modal').addEventListener('click', () => modal.style.display = 'none');

        modal.addEventListener('click', (e) => {
            if (e.target === modal) modal.style.display = 'none';
        });

        init();
    </script>
