<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
    <title>Interactive Periodic Table | Chemical Elements Explorer</title>
    <meta name="title" content="Interactive Periodic Table | Chemical Elements Explorer">
    <meta name="description"
        content="Explore the chemical elements with this interactive periodic table. View atomic numbers, symbols, weights, and detailed properties of every element in a responsive JS interface.">
    <meta name="keywords"
        content="periodic table, chemistry, chemical elements, atomic number, science app, interactive periodic table, javascript periodic table, kbrault">
    <meta name="author" content="kbrault">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="index, follow">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://chem.braultkevin.fr">
    <meta property="og:title" content="Interactive Periodic Table | Chemical Elements Explorer">
    <meta property="og:description"
        content="A fully interactive, responsive periodic table built with JavaScript. Perfect for students and chemistry enthusiasts.">
    <meta property="og:image" content="https://chem.braultkevin.fr/screenshot.png">
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://chem.braultkevin.fr/">
    <meta property="twitter:title" content="Interactive Periodic Table Explorer">
    <meta property="twitter:description"
        content="Browse and learn about chemical elements with this interactive periodic table web application.">
    <meta property="twitter:image" content="https://chem.braultkevin.fr//screenshot.png">
    <link rel="canonical" href="https://chem.braultkevin.fr/">
    <style>
        :root {
            --bg-color: #0b0f1a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --accent: #a0a6ad;
            --alkali: #ef4444;
            --alkaline: #f97316;
            --transition: #eab308;
            --post-transition: #a855f7;
            --metalloid: #10b981;
            --nonmetal: #0ea5e9;
            --noble: #ec4899;
            --lanthanide: #6366f1;
            --actinide: #d946ef;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .control-box,
        input[type="text"],
        select,
        .reset-btn {
            background: var(--card-bg);
            padding: 0 15px;
            border-radius: 12px;
            border: 1px solid #334155;
            color: white;
            height: 50px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
            outline: none;
        }

        .reset-btn {
            cursor: pointer;
            background: #334155;
            transition: all 0.2s;
            font-weight: bold;
            border: 1px solid #475569;
            height: 110px;
        }

        .reset-btn:hover {
            background: #ef4444;
            border-color: #ef4444;
        }

        .legend {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(30, 41, 59, 0.5);
            border-radius: 15px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            white-space: nowrap;
        }

        .legend-dot {
            width: 14px;
            height: 14px;
            border-radius: 3px;
            border: 1px solid transparent;
        }

        .legend-dot.state-solid {
            border: 1px solid #475569;
        }

        .legend-dot.state-liquid {
            box-shadow: inset 0 0 10px var(--accent);
            border: 1px solid var(--accent);
        }

        .legend-dot.state-gas {
            border: 1px dashed var(--accent);
        }

        .table-wrapper {
            width: 100%;
            overflow-x: auto;
            padding: 20px 0;
            display: flex;
        }

        .periodic-table {
            display: grid;
            grid-template-columns: repeat(18, 68px);
            grid-template-rows: repeat(10, 68px);
            gap: 6px;
            margin: auto;
            width: fit-content;
        }

        .element-card {
            background-color: var(--card-bg);
            padding: 8px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            border-bottom: 4px solid transparent;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.4s ease, opacity 0.4s ease;
        }

        .element-card:hover {
            transform: scale(1.6);
            z-index: 100;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.9);
            background-color: #2d3748;
        }

        .element-card .num {
            font-size: 0.7rem;
            position: absolute;
            top: 5px;
            left: 8px;
            opacity: 0.6;
        }

        .element-card .sym {
            font-size: 1.4rem;
            font-weight: bold;
        }

        .dimmed {
            opacity: 0.1 !important;
            filter: grayscale(0.8) blur(2px) !important;
            pointer-events: none;
        }

        .state-liquid {
            box-shadow: inset 0 0 25px var(--accent);
        }

        .state-gas {
            border-style: dashed !important;
            opacity: 0.5;
        }

        .alkali-metal {
            border-color: var(--alkali);
        }

        .alkaline-earth-metal {
            border-color: var(--alkaline);
        }

        .transition-metal {
            border-color: var(--transition);
        }

        .post-transition-metal {
            border-color: var(--post-transition);
        }

        .metalloid {
            border-color: var(--metalloid);
        }

        .diatomic-nonmetal {
            border-color: var(--nonmetal);
        }

        .noble-gas {
            border-color: var(--noble);
        }

        .lanthanide {
            border-color: var(--lanthanide);
        }

        .actinide {
            border-color: var(--actinide);
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: #1e293b;
            padding: 40px;
            border-radius: 24px;
            width: 90%;
            max-width: 650px;
            position: relative;
            border: 1px solid #334155;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        #close-modal {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 30px;
            height: 30px;
            background: none;
            border: none;
            cursor: pointer;
        }

        #close-modal::before,
        #close-modal::after {
            content: '';
            position: absolute;
            top: 14px;
            left: 0;
            width: 30px;
            height: 2px;
            background-color: white;
        }

        #close-modal::before {
            transform: rotate(45deg);
        }

        #close-modal::after {
            transform: rotate(-45deg);
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            border-top: 1px solid #334155;
            padding-top: 20px;
            margin-top: 20px;
        }

        .info-item b {
            display: block;
            color: var(--accent);
            font-size: 0.8rem;
        }

        .wiki-btn {
            display: block;
            margin-top: 25px;
            padding: 12px;
            text-align: center;
            text-decoration: none;
            font-weight: bold;
            border-radius: 8px;
            color: white;
            transition: opacity 0.2s;
        }
    </style>
</head>

<body>

    <header>
        <div class="controls">
            <button class="reset-btn" onclick="resetAllFilters()">Reset All</button>

            <div class="control-group">
                <input type="text" id="search" placeholder="Search..." oninput="filterElements()">
                <select id="filter-category" onchange="filterElements()">
                    <option value="all">All Groups</option>
                    <option value="alkali-metal">Alkali</option>
                    <option value="alkaline-earth-metal">Alkaline</option>
                    <option value="transition-metal">Transition</option>
                    <option value="post-transition-metal">Post-Transition</option>
                    <option value="lanthanide">Lanthanide</option>
                    <option value="actinide">Actinide</option>
                    <option value="metalloid">Metalloid</option>
                    <option value="diatomic-nonmetal">Nonmetal</option>
                    <option value="noble-gas">Noble Gas</option>
                </select>
            </div>

            <div class="control-group">
                <div class="control-box">
                    <label>Temp: <b id="temp-val">298</b>K</label>
                    <input type="range" id="temp-slider" min="0" max="6000" value="298"
                        oninput="updateStates(this.value); filterElements();">
                </div>
                <div class="control-box">
                    <label>Melt: <b id="melt-val">0</b>K+</label>
                    <input type="range" id="melt-slider" min="0" max="4000" value="0" oninput="filterElements()">
                </div>
            </div>

            <div class="control-group">
                <div class="control-box">
                    <label>Valence: <b id="valence-val">All</b></label>
                    <input type="range" id="valence-slider" min="0" max="8" value="0" oninput="filterElements()">
                </div>
                <div class="control-box">
                    <label>EN: <b id="en-val">All</b></label>
                    <input type="range" id="en-slider" min="0" max="4" step="0.1" value="0" oninput="filterElements()">
                </div>
            </div>
        </div>

        <div class="legend">
            <div class="legend-item">
                <div class="legend-dot" style="background:var(--alkali)"></div>Alkali
            </div>
            <div class="legend-item">
                <div class="legend-dot" style="background:var(--alkaline)"></div>Alkaline
            </div>
            <div class="legend-item">
                <div class="legend-dot" style="background:var(--transition)"></div>Transition
            </div>
            <div class="legend-item">
                <div class="legend-dot" style="background:var(--metalloid)"></div>Metalloid
            </div>
            <div class="legend-item">
                <div class="legend-dot" style="background:var(--nonmetal)"></div>Nonmetal
            </div>
            <div class="legend-item">
                <div class="legend-dot" style="background:var(--noble)"></div>Noble Gas
            </div>
            <div style="border-left: 1px solid #334155; height: 20px; margin: 0 10px;"></div>
            <div class="legend-item">
                <div class="legend-dot state-solid"></div>Solid
            </div>
            <div class="legend-item">
                <div class="legend-dot state-liquid"></div>Liquid
            </div>
            <div class="legend-item">
                <div class="legend-dot state-gas"></div>Gas
            </div>
        </div>
    </header>

    <div class="table-wrapper">
        <div id="periodic-table" class="periodic-table"></div>
    </div>

    <div id="modal-overlay" class="modal-overlay" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button id="close-modal" onclick="closeModal()"></button>
            <div id="modal-body"></div>
        </div>
    </div>

    <script>
        let elements = [];

        async function init() {
            try {
                const res = await fetch('elements.json');
                elements = await res.json();
                const table = document.getElementById('periodic-table');

                elements.forEach(el => {
                    const card = document.createElement('div');
                    card.className = `element-card ${el.cat}`;
                    card.dataset.num = el.n.toString();
                    card.dataset.name = el.name.toLowerCase();
                    card.dataset.symbol = el.s.toLowerCase();
                    card.dataset.cat = el.cat;
                    card.dataset.valence = el.valence || 0;
                    card.dataset.melt = (el.melt === "N/A" || !el.melt) ? 0 : el.melt;
                    card.dataset.en = (el.en === "N/A" || !el.en) ? 0 : el.en;

                    card.style.gridColumn = el.x;
                    card.style.gridRow = el.y;

                    card.innerHTML = `<span class="num">${el.n}</span><span class="sym">${el.s}</span><span style="font-size:0.6rem;">${el.name}</span>`;
                    card.onclick = () => showDetails(el);
                    table.appendChild(card);
                });
                updateStates(298);
            } catch (e) { console.error("JSON Error", e); }
        }

        function resetAllFilters() {
            document.getElementById('search').value = '';
            document.getElementById('filter-category').value = 'all';
            document.getElementById('temp-slider').value = 298;
            document.getElementById('melt-slider').value = 0;
            document.getElementById('valence-slider').value = 0;
            document.getElementById('en-slider').value = 0;
            updateStates(298);
            filterElements();
        }

        function filterElements() {
            const query = document.getElementById('search').value.toLowerCase();
            const cat = document.getElementById('filter-category').value;
            const valenceVal = parseInt(document.getElementById('valence-slider').value);
            const meltLimit = parseInt(document.getElementById('melt-slider').value);
            const enLimit = parseFloat(document.getElementById('en-slider').value);

            document.getElementById('valence-val').innerText = valenceVal === 0 ? "All" : valenceVal;
            document.getElementById('melt-val').innerText = meltLimit;
            document.getElementById('en-val').innerText = enLimit === 0 ? "All" : enLimit;

            document.querySelectorAll('.element-card').forEach(card => {
                const matchesSearch = card.dataset.name.includes(query) || card.dataset.symbol.includes(query) || card.dataset.num.includes(query);
                const matchesCat = (cat === 'all' || card.dataset.cat === cat);
                const matchesValence = (valenceVal === 0 || parseInt(card.dataset.valence) === valenceVal);
                const matchesMelt = (parseFloat(card.dataset.melt) >= meltLimit);
                const matchesEN = (enLimit === 0 || parseFloat(card.dataset.en) >= enLimit);
                card.classList.toggle('dimmed', !(matchesSearch && matchesCat && matchesValence && matchesMelt && matchesEN));
            });
        }

        function updateStates(kelvin) {
            document.getElementById('temp-val').innerText = kelvin;
            elements.forEach(el => {
                const card = document.querySelector(`.element-card[data-num="${el.n}"]`);
                if (!card) return;
                card.classList.remove('state-liquid', 'state-gas');
                if (el.melt !== "N/A" && kelvin > el.melt && kelvin < el.boil) card.classList.add('state-liquid');
                if (el.boil !== "N/A" && kelvin >= el.boil) card.classList.add('state-gas');
            });
        }

        function showDetails(el) {
            const body = document.getElementById('modal-body');
            const modalContent = document.querySelector('.modal-content');
            const categoryColors = {
                'alkali-metal': 'var(--alkali)', 'alkaline-earth-metal': 'var(--alkaline)', 'transition-metal': 'var(--transition)',
                'post-transition-metal': 'var(--post-transition)', 'metalloid': 'var(--metalloid)', 'diatomic-nonmetal': 'var(--nonmetal)',
                'noble-gas': 'var(--noble)', 'lanthanide': 'var(--lanthanide)', 'actinide': 'var(--actinide)'
            };
            const groupColor = categoryColors[el.cat] || 'var(--accent)';
            modalContent.style.borderColor = groupColor;
            modalContent.style.boxShadow = `0 0 20px ${groupColor}40`;

            body.innerHTML = `
                <h2 style="font-size:2.5rem; margin:0 0 20px 0; color:${groupColor};">${el.name} (${el.s})</h2>
                <div style="display: flex; gap: 30px; align-items: start; flex-wrap: wrap;">
                    <div style="flex: 1; min-width: 200px;">
                        <div class="info-grid" style="margin-top:0; border-top:none;">
                            <div class="info-item"><b>Atomic Number</b> <code>${el.n}</code></div>
                            <div class="info-item"><b>Atomic Mass</b> <code>${el.m} u</code></div>
                            <div class="info-item"><b>Configuration</b> <code>${el.config}</code></div>
                            <div class="info-item"><b>Valence Electrons</b> <code>${el.valence}</code></div>
                            <div class="info-item"><b>Melting Point</b> <code>${el.melt} K</code></div>
                            <div class="info-item"><b>Electronegativity</b> <code>${el.en}</code></div>
                        </div>
                        <a href="https://en.wikipedia.org/wiki/${el.name}" target="_blank" class="wiki-btn" style="background-color:${groupColor};">WIKIPEDIA</a>
                    </div>
                    <div style="width: 220px; text-align: center;">
                        <canvas id="bohr-canvas" width="220" height="220"></canvas>
                        <div style="color: var(--accent); font-size: 0.7rem; margin-top: 5px;">Bohr Model (Electron Shells)</div>
                    </div>
                </div>
            `;
            document.getElementById('modal-overlay').style.display = 'flex';
            drawBohrFromConfig(el, groupColor);
        }

        function drawBohrFromConfig(el, accentColor) {
            const canvas = document.getElementById('bohr-canvas');
            const ctx = canvas.getContext('2d');
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;

            const rootStyle = getComputedStyle(document.documentElement);
            const hexColor = accentColor.startsWith('var') 
                ? rootStyle.getPropertyValue(accentColor.match(/\(([^)]+)\)/)[1]).trim() 
                : accentColor;

            const cores = {
                '[He]': [2], '[Ne]': [2, 8], '[Ar]': [2, 8, 8],
                '[Kr]': [2, 8, 18, 8], '[Xe]': [2, 8, 18, 18, 8],
                '[Rn]': [2, 8, 18, 32, 18, 8]
            };

            let shells = [0, 0, 0, 0, 0, 0, 0];
            const configParts = el.config.split(' ');
            configParts.forEach(part => {
                if (cores[part]) { cores[part].forEach((count, i) => shells[i] = count); }
                else {
                    const shellNum = parseInt(part.charAt(0));
                    const electronMatch = part.match(/\d+$/);
                    if (shellNum && electronMatch) { shells[shellNum - 1] += parseInt(electronMatch[0]); }
                }
            });

            const activeShells = shells.filter(s => s > 0);
            const numShells = activeShells.length;

            const minRadius = 30;
            const maxAllowedRadius = 92; 
            const spacing = numShells > 1 ? (maxAllowedRadius - minRadius) / (numShells - 1) : 0;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Nucleus
            ctx.beginPath();
            ctx.arc(cx, cy, 14, 0, Math.PI * 2);
            ctx.fillStyle = hexColor; 
            ctx.fill();

            // Shells
            activeShells.forEach((count, i) => {
                const radius = numShells === 1 ? 60 : minRadius + (i * spacing);

                ctx.beginPath();
                ctx.arc(cx, cy, radius, 0, Math.PI * 2);
                ctx.strokeStyle = "rgba(255, 255, 255, 0.15)";
                ctx.stroke();

                for (let e = 0; e < count; e++) {
                    const angle = (e / count) * (Math.PI * 2) - (Math.PI / 2);
                    const ex = cx + Math.cos(angle) * radius;
                    const ey = cy + Math.sin(angle) * radius;

                    ctx.beginPath();
                    ctx.arc(ex, ey, 2.8, 0, Math.PI * 2); 
                    ctx.fillStyle = hexColor;
                    ctx.fill();
                }
            });
        }

        function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }
        init();
    </script>
</body>

</html>
